<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Fabric-8</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="admin-login-screen">
    <div class="login-box">
      <div class="logo">
        <img src="assets/fabric8_logo_white.png" alt="Fabric-8 Logo">
      </div>
      <h2>Admin Login</h2>
      <div id="loginError" class="error-msg"></div>
      <div class="input-group">
        <label>Password</label>
        <div style="position: relative;">
          <input type="password" id="adminPassword" placeholder="Enter password" autocomplete="current-password" style="padding-right: 40px;">
          <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: var(--muted); padding: 0;">👁️</button>
        </div>
      </div>
      <button id="loginBtn" class="quote-link w-full">Login</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display: none;">
    <header class="admin-header glassmorphism">
      <div class="logo">
        <img src="assets/fabric8_logo_white.png" alt="Fabric-8 Logo">
      </div>
      <div class="admin-controls">
        <button id="logoutBtn" class="btn-icon">Logout</button>
      </div>
    </header>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1>Products</h1>
        
        <div class="admin-filters">
          <input type="text" id="searchBox" class="filter-input" placeholder="Search by SKU or Name...">
          <select id="categoryFilter" class="filter-select">
            <option value="All">All Categories</option>
            <option value="Top Wear">Top Wear</option>
            <option value="Bottom Wear">Bottom Wear</option>
            <option value="Outerwear">Outerwear</option>
            <option value="Accessories">Accessories</option>
          </select>
          <button id="bulkDeleteBtn" class="quote-link" style="background: #e74c3c; color: #fff; border-color: #e74c3c; display: none;">Delete Selected</button>
          <button id="addProductBtn" class="quote-link">+ Add Product</button>
        </div>
      </div>

      <div class="table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width: 40px;"><input type="checkbox" id="selectAllProducts"></th>
              <th>Image</th>
              <th>SKU</th>
              <th>Name</th>
              <th>Category</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productTableBody">
            <!-- Products injected here -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div id="productModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Product</h2>
        <button id="closeModalBtn" class="close-btn">&times;</button>
      </div>
      <form id="productForm">
        <input type="hidden" id="docId">
        <div class="form-grid">
          <div class="input-group">
            <label>SKU</label>
            <input type="text" id="sku" required>
          </div>
          <div class="input-group">
            <label>Product Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="input-group">
            <label>Category</label>
            <select id="category" required>
              <option value="Top Wear">Top Wear</option>
              <option value="Bottom Wear">Bottom Wear</option>
              <option value="Accessories">Accessories</option>
              <option value="Head Wear">Head Wear</option>
              <option value="Outer Wear">Outer Wear</option>
              <option value="ADD_NEW" style="font-weight: bold; color: var(--accent);">+ Add New Category...</option>
            </select>
          </div>
          <div class="input-group">
            <label>Gender</label>
            <div class="multi-select">
              <div class="select-box">
                <span class="selected-text" id="genderText">Select Gender</span>
                <span class="arrow">▼</span>
              </div>
              <div class="dropdown-menu" style="display: none;">
                <div class="checkbox-group column" id="genderGroup">
                  <label><input type="checkbox" value="Men"> Men</label>
                  <label><input type="checkbox" value="Women"> Women</label>
                  <label><input type="checkbox" value="Unisex"> Unisex</label>
                </div>
              </div>
            </div>
          </div>
          <div class="input-group full-width">
            <label>Sectors (comma separated)</label>
            <input type="text" id="sectors" placeholder="e.g. Corporate, Healthcare">
          </div>
          <div class="input-group full-width">
            <label>Short Description</label>
            <input type="text" id="short" required>
          </div>
          <div class="input-group full-width">
            <label>Long Description</label>
            <textarea id="long" rows="3" required></textarea>
          </div>
          <div class="input-group full-width">
            <label>Sizes</label>
            <div class="multi-select">
              <div class="select-box">
                <span class="selected-text" id="sizesText">Select Sizes</span>
                <span class="arrow">▼</span>
              </div>
              <div class="dropdown-menu" style="display: none;">
                <div class="dropdown-header">
                  <a href="#" id="selectAllSizes" class="select-all">Select All</a>
                </div>
                <div class="checkbox-group column" id="sizesGroup">
                  <label><input type="checkbox" value="XS"> XS</label>
                  <label><input type="checkbox" value="S"> S</label>
                  <label><input type="checkbox" value="M"> M</label>
                  <label><input type="checkbox" value="L"> L</label>
                  <label><input type="checkbox" value="XL"> XL</label>
                  <label><input type="checkbox" value="2XL"> 2XL</label>
                  <label><input type="checkbox" value="3XL"> 3XL</label>
                  <label><input type="checkbox" value="4XL"> 4XL</label>
                  <input type="text" id="otherSizes" placeholder="Other sizes (comma separated)" style="width: 100%; margin-top: 10px; padding: 6px;">
                </div>
              </div>
            </div>
          </div>
          <div class="input-group full-width">
            <label>Colors</label>
            <div class="multi-select">
              <div class="select-box">
                <span class="selected-text" id="colorsText">Select Colors</span>
                <span class="arrow">▼</span>
              </div>
              <div class="dropdown-menu" style="display: none;">
                <div class="dropdown-header">
                  <a href="#" id="selectAllColors" class="select-all">Select All</a>
                </div>
                <div class="checkbox-group column" id="colorsGroup">
                  <label><input type="checkbox" value="Black"> Black</label>
                  <label><input type="checkbox" value="White"> White</label>
                  <label><input type="checkbox" value="Red"> Red</label>
                  <label><input type="checkbox" value="Navy"> Navy</label>
                  <label><input type="checkbox" value="Green"> Green</label>
                  <label><input type="checkbox" value="Burgundy"> Burgundy</label>
                  <label><input type="checkbox" value="Light Grey"> Light Grey</label>
                  <label><input type="checkbox" value="Dark Grey"> Dark Grey</label>
                  <input type="text" id="otherColors" placeholder="Other colors (comma separated)" style="width: 100%; margin-top: 10px; padding: 6px;">
                </div>
              </div>
            </div>
          </div>
          <div class="input-group">
            <label>Fabric / Composition</label>
            <input type="text" id="fabric" placeholder="e.g. 100% Cotton">
          </div>
          <div class="input-group">
            <label>GSM</label>
            <input type="text" id="gsm" placeholder="e.g. 180 GSM">
          </div>
          <div class="input-group">
            <label>Lead Time</label>
            <input type="text" id="leadTime" placeholder="e.g. 2-3 Weeks">
          </div>
          <div class="input-group">
            <label>Care Instructions</label>
            <input type="text" id="care" placeholder="e.g. Machine wash cold, tumble dry low.">
          </div>
          <div class="input-group">
            <label>MOQ</label>
            <input type="text" id="moq" placeholder="e.g. 50 Pieces">
          </div>
          
          <div class="input-group full-width image-upload-group">
            <label>Product Images</label>
            <div id="imagePreviewContainer" class="image-preview-grid" style="display:flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
              <!-- Thumbnails injected here -->
            </div>
            <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp" multiple>
            <input type="hidden" id="imageUrl">
            <p id="uploadStatus" class="upload-status"></p>
          </div>
        </div>
        
        <div class="modal-actions">
          <button type="button" id="cancelModalBtn" class="button outline">Cancel</button>
          <button type="submit" id="saveProductBtn" class="button primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK via CDN -->
  <script type="module" src="admin.js"></script>
</body>
</html>

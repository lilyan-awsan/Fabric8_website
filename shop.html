<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fabric8 | Shop & Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="site.css?v=2" />
</head>

<body>
  <div class="topline"><a href="shop.html" style="color: var(--yellow, #ffd700);">BRING YOUR IDENTITY TO LIFE.</a></div>
  <header class="header">
      <a class="logo" href="index.html"><h2 style="margin: 0; font-size: 22px; font-weight: 900;">Fabric 8</h2></a>
      <nav>
        <a href="services.html">Services</a>
        <a href="method.html">The Fabric 8 Method</a>
        <a href="sectors.html">Sectors</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="about.html">About Us</a>
      </nav>
      <div class="header-actions" style="display: flex; gap: 15px; align-items: center;">
        <select class="country-selector" style="min-height: 36px; padding: 4px 8px; font-size: 11px; border-radius: 8px; border: 1px solid var(--line); background: transparent; cursor: pointer; text-transform: uppercase; font-weight: 800;">
          <option value="US">USA</option>
          <option value="JO">Jordan</option>
          <option value="INT">International</option>
        </select>
        <div class="search-box" style="position: relative;">
          <input type="search" placeholder="Search..." style="min-height: 36px; width: 140px; padding: 4px 12px; font-size: 12px; border-radius: 20px; border: 1px solid var(--line);" />
        </div>
        <a class="quote-link" href="shop.html#quote" aria-label="View Cart">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
          <span id="cartCount" style="font-weight: 900; font-size: 14px;">0</span>
        </a>
      </div>
    </header>

  <main>
    <section class="page-hero shop-hero">
      <div>
        <p>Product Catalog</p>
        <h1>The Garment Matrix, Made to Order</h1><span>Select items, preview branding, and request one quotation.</span>
      </div>
    </section>

    <section class="catalog-page" style="max-width: 1400px; margin: 0 auto; padding: 40px 20px;">
      <div class="catalog-layout">
        <!-- Sidebar Filters -->
        <aside class="catalog-sidebar">
          <h3 class="filter-toggle"
            style="margin-top: 0; font-size: 16px; margin-bottom: 20px; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
            Filters <span class="toggle-icon" style="display: none; font-size: 20px;">+</span>
          </h3>
          <div class="filter-contents">
            <div class="filter-group">
              <label for="productSearch" style="font-size: 12px; font-weight: bold;">Search</label>
              <input type="search" id="productSearch" placeholder="Search by SKU or name..."
                style="width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 4px; font-family: inherit;">
            </div>

            <div class="filter-group">
              <label style="font-size: 12px; font-weight: bold;">Category</label>
              <div id="categoryFilterContainer"
                style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                <!-- Categories injected here -->
              </div>
            </div>

            <div class="filter-group" style="margin-top: 24px;">
              <label style="font-size: 12px; font-weight: bold;">Sort By</label>
              <select id="sortFilter"
                style="width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 4px; font-family: inherit; margin-top: 8px;">
                <option value="featured">Featured</option>
                <option value="A-Z">Name A-Z</option>
                <option value="Z-A">Name Z-A</option>
              </select>
            </div>
          </div>
        </aside>

        <!-- Main Grid -->
        <div class="catalog-main">
          <div id="productGrid" class="catalog-grid">
            <!-- Product Cards injected here -->
          </div>
        </div>
      </div>
    </section>

      </div>
    </section>
  </main>

          <label style="font-size: 13px; font-weight: bold;">Finish

            <select id="editLogoFinish" style="width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 4px; font-family: inherit; margin-top: 4px;">

              <option value="Embroidery">Embroidery</option>

              <option value="Screen printing">Screen printing</option>

              <option value="Heat transfer">Heat transfer</option>

            </select>

          </label>

        </div>



        <button type="button" class="primary-btn" id="saveEditLogoBtn" style="width: 100%; padding: 14px;">Save Changes</button>

      </div>

    </div>



    <!-- Firebase SDK -->

    <script src="site.js"></script>

  </body>

</html>
